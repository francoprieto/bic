<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BiC - Firmador Digital</title>
  <script src="tailwind.min.js"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
</head>
<body class="bg-gray-200 dark:bg-gray-800 min-h-screen flex flex-col items-center pt-4 transition-colors">

  <!-- Header -->
  <div class="w-full max-w-2xl flex justify-between items-center px-2 mb-3">
    <select id="profileSelect"
      class="text-sm px-2 py-1 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400 max-w-[180px]">
    </select>

    <h1 class="text-2xl font-serif italic font-semibold text-blue-700 dark:text-blue-400
               bg-white dark:bg-gray-900 border border-blue-700 dark:border-blue-400
               px-3 py-0.5 rounded-lg shadow">BiC</h1>

    <button id="toggleDark" title="Modo oscuro"
      class="w-9 h-9 rounded-full bg-gray-300 dark:bg-gray-700 hover:bg-gray-400 dark:hover:bg-gray-600
             flex items-center justify-center text-lg shadow transition-colors">
      <span id="darkIcon">🌙</span>
    </button>
  </div>

  <!-- Card principal -->
  <div class="w-full max-w-2xl bg-white dark:bg-gray-900 rounded-xl shadow-xl overflow-hidden">

    <!-- Tabs -->
    <div class="flex border-b border-gray-200 dark:border-gray-700" role="tablist">
      <button data-tab="sign"   class="tab-btn active flex-1 py-2 text-sm font-medium" role="tab">Firma</button>
      <button data-tab="log"    class="tab-btn flex-1 py-2 text-sm font-medium" role="tab">Log</button>
      <button data-tab="config" class="tab-btn flex-1 py-2 text-sm font-medium" role="tab">Configuración</button>
    </div>

    <!-- Panel: Firma -->
    <div id="panel-sign" class="tab-panel p-4">

      <!-- Controles de firma -->
      <div class="flex flex-wrap items-center gap-2 p-3 mb-3 border border-gray-200 dark:border-gray-700 rounded-lg">
        <label id="passwordLabel" class="text-sm font-semibold text-blue-700 dark:text-blue-400 whitespace-nowrap">PIN token:</label>
        <input id="password" type="password" placeholder="PIN del token" required
          class="w-36 text-sm px-2 py-1 rounded border border-gray-300 dark:border-gray-600
                 dark:bg-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400">

        <label class="flex items-center gap-1 text-sm text-gray-700 dark:text-gray-300 cursor-pointer ml-2">
          <input id="useCert" type="checkbox" class="rounded"> Usar certificado
        </label>

        <button id="signBtn" disabled
          class="ml-auto bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed
                 text-white text-sm font-semibold px-4 py-1 rounded transition-colors">
          Firmar
        </button>

        <div id="spinner" class="hidden items-center gap-2 text-blue-600 text-sm">
          <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          <span id="progressText"></span>
        </div>

        <!-- Panel .p12: solo selector de archivo, la contraseña usa el campo de arriba -->
        <div id="certPanel" class="hidden w-full flex items-center gap-2 pt-2 border-t border-gray-200 dark:border-gray-700">
          <button id="selectCertBtn"
            class="text-xs bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600
                   text-gray-800 dark:text-gray-100 px-2 py-1 rounded">📂 Elegir certificado *.p12</button>
          <span id="certFileName" class="text-xs text-gray-500 dark:text-gray-400 truncate flex-1">Sin certificado seleccionado</span>
        </div>
      </div>

      <!-- Mensaje -->
      <div id="signMsg" class="hidden mb-3 p-3 rounded-lg text-sm"></div>

      <!-- Links a archivos firmados -->
      <div id="signedLinks" class="hidden mb-3 p-2 rounded-lg bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 flex flex-col gap-1"></div>

      <!-- Barra de archivos -->
      <div class="flex items-center justify-between bg-gray-400 dark:bg-blue-800 rounded-lg px-3 py-2 mb-2">
        <label class="flex items-center gap-2 text-gray-900 dark:text-gray-100 text-sm cursor-pointer">
          <input id="selectAll" type="checkbox" class="rounded"> Archivos
        </label>
        <div class="flex gap-3">
          <button id="openFilesBtn" title="Abrir archivos locales">
            <svg class="w-5 h-5 text-gray-800 dark:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 19V6a1 1 0 011-1h4.032a1 1 0 01.768.36l1.9 2.28a1 1 0 00.768.36H16a1 1 0 011 1v1M3 19l3-8h15l-3 8H3Z"/>
            </svg>
          </button>
          <button id="resetBtn" title="Reiniciar">
            <svg class="w-5 h-5 text-gray-800 dark:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.651 7.65a7.131 7.131 0 00-12.68 3.15M18.001 4v4h-4m-7.652 8.35a7.13 7.13 0 0012.68-3.15M6 20v-4h4"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="fileList" class="space-y-1 max-h-72 overflow-y-auto"></div>
    </div>

    <!-- Panel: Log -->
    <div id="panel-log" class="tab-panel hidden p-4">
      <p class="text-sm font-semibold text-blue-700 dark:text-blue-400 mb-2">Log de operaciones</p>
      <div id="logContent" class="text-xs font-mono space-y-1 max-h-96 overflow-y-auto"></div>
    </div>

    <!-- Panel: Configuración -->
    <div id="panel-config" class="tab-panel hidden p-4 max-h-[520px] overflow-y-auto">

      <!-- Gestión de perfiles -->
      <div class="flex flex-col border border-gray-200 dark:border-gray-700 p-3 mb-4 rounded-lg shadow-md">
        <div class="flex flex-row justify-between items-center">
          <div class="text-blue-700 dark:text-blue-400 font-semibold text-sm whitespace-nowrap">
            Gestión de Perfiles
          </div>
          <div class="flex gap-2">
            <button id="newProfileBtn" type="button"
              class="bg-green-600 hover:bg-green-700 text-white font-semibold text-xs py-1 px-3 rounded transition-colors">
              + Nuevo
            </button>
            <button id="saveProfileBtn" type="button"
              class="bg-blue-600 hover:bg-blue-700 text-white font-semibold text-xs py-1 px-3 rounded transition-colors">
              💾 Guardar
            </button>
            <button id="delProfileBtn" type="button"
              class="bg-red-600 hover:bg-red-700 text-white font-semibold text-xs py-1 px-3 rounded transition-colors">
              🗑️ Eliminar
            </button>
          </div>
        </div>
      </div>

      <!-- Posición de firma -->
      <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-3 mb-4">
        <p class="text-sm font-semibold text-blue-700 dark:text-blue-400 mb-2">Posición de la firma</p>
        <div class="grid grid-cols-3 gap-1 mb-3">
          <button data-pos="esquina-superior-izquierda" class="pos-btn py-1 text-xs rounded border">↖ Sup. Izq.</button>
          <button data-pos="centro-superior"            class="pos-btn py-1 text-xs rounded border">↑ Centro Sup.</button>
          <button data-pos="esquina-superior-derecha"   class="pos-btn py-1 text-xs rounded border">↗ Sup. Der.</button>
          <button data-pos="esquina-inferior-izquierda" class="pos-btn py-1 text-xs rounded border">↙ Inf. Izq.</button>
          <button data-pos="centro-inferior"            class="pos-btn py-1 text-xs rounded border active-pos">↓ Centro Inf.</button>
          <button data-pos="esquina-inferior-derecha"   class="pos-btn py-1 text-xs rounded border">↘ Inf. Der.</button>
        </div>
        <div class="flex gap-2 mb-2">
          <label class="text-xs text-gray-600 dark:text-gray-400 w-16">Página:</label>
          <select id="pagina" class="text-xs flex-1 px-1 py-0.5 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100">
            <option value="primera">Primera</option>
            <option value="up">Última</option>
            <option value="np">Número específico</option>
          </select>
          <input id="numeroPagina" type="number" min="1" placeholder="Nº"
            class="hidden w-16 text-xs px-1 py-0.5 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100">
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div class="flex items-center gap-1">
            <label class="text-xs text-gray-600 dark:text-gray-400 w-12">Alto:</label>
            <input id="alto" type="number" value="40" class="flex-1 text-xs px-1 py-0.5 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100">
          </div>
          <div class="flex items-center gap-1">
            <label class="text-xs text-gray-600 dark:text-gray-400 w-12">Ancho:</label>
            <input id="ancho" type="number" value="160" class="flex-1 text-xs px-1 py-0.5 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100">
          </div>
        </div>
      </div>

      <!-- Márgenes -->
      <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-3 mb-4">
        <p class="text-sm font-semibold text-blue-700 dark:text-blue-400 mb-2">Márgenes (px)</p>
        <div class="grid grid-cols-2 gap-2">
          <div class="flex items-center gap-1">
            <label class="text-xs text-gray-600 dark:text-gray-400 w-12">Superior:</label>
            <input id="mt" type="number" value="50" class="flex-1 text-xs px-1 py-0.5 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100">
          </div>
          <div class="flex items-center gap-1">
            <label class="text-xs text-gray-600 dark:text-gray-400 w-12">Inferior:</label>
            <input id="mb" type="number" value="50" class="flex-1 text-xs px-1 py-0.5 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100">
          </div>
          <div class="flex items-center gap-1">
            <label class="text-xs text-gray-600 dark:text-gray-400 w-12">Izquierda:</label>
            <input id="ml" type="number" value="50" class="flex-1 text-xs px-1 py-0.5 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100">
          </div>
          <div class="flex items-center gap-1">
            <label class="text-xs text-gray-600 dark:text-gray-400 w-12">Derecha:</label>
            <input id="mr" type="number" value="50" class="flex-1 text-xs px-1 py-0.5 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100">
          </div>
        </div>
      </div>

      <!-- Imagen de firma -->
      <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-3 mb-4">
        <p class="text-sm font-semibold text-blue-700 dark:text-blue-400 mb-2">Imagen de firma (apariencia)</p>
        <div class="flex items-center gap-3">
          <img id="sigPreview" class="h-12 border rounded hidden" alt="Vista previa">
          <div id="sigPlaceholder"
            class="h-12 w-24 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded
                   flex items-center justify-center text-gray-400 dark:text-gray-500 text-xs">
            Sin imagen
          </div>
          <div class="flex flex-col gap-1">
            <button id="uploadSigBtn"
              class="text-xs bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600
                     text-gray-800 dark:text-gray-100 px-2 py-1 rounded">Subir imagen</button>
            <button id="clearSigBtn"
              class="text-xs bg-red-100 hover:bg-red-200 text-red-700 px-2 py-1 rounded">Quitar</button>
          </div>
        </div>
        <input id="sigInput" type="file" accept="image/png,image/jpeg" class="hidden">
      </div>

      <!-- Directorio destino -->
      <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-3 mb-4">
        <p class="text-sm font-semibold text-blue-700 dark:text-blue-400 mb-2">Directorio de salida</p>
        <div class="flex gap-2">
          <input id="directorio" type="text" placeholder="Por defecto: ~/.bic/firmados"
            class="flex-1 text-sm px-2 py-1 rounded border border-gray-300 dark:border-gray-600
                   dark:bg-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <button id="selectDirBtn" type="button"
            class="text-xs bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600
                   text-gray-800 dark:text-gray-100 px-2 py-1 rounded whitespace-nowrap">
            📂 Elegir
          </button>
        </div>
      </div>

      <!-- Previsualizar firma -->
      <div class="flex justify-center">
        <button id="previewSignBtn" type="button"
          class="bg-blue-600 hover:bg-blue-700 text-white font-semibold text-xs py-2 px-4 rounded transition-colors">
          👁 Previsualizar firma
        </button>
      </div>

    </div>
  </div>

  <!-- Modal: Nuevo perfil -->
  <div id="modal-nuevo-perfil" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl p-6 w-80">
      <h3 class="text-base font-semibold text-gray-900 dark:text-gray-100 mb-4">Nuevo Perfil</h3>
      <input type="text" id="input-nombre-perfil" placeholder="Nombre del perfil"
        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded focus:outline-none focus:ring-2 focus:ring-blue-400 dark:bg-gray-700 dark:text-gray-100 mb-4 text-sm" />
      <div class="flex justify-end gap-2">
        <button id="btn-cancelar-perfil" type="button"
          class="px-4 py-2 text-sm bg-gray-200 hover:bg-gray-300 dark:bg-gray-600 dark:hover:bg-gray-500 text-gray-800 dark:text-gray-100 rounded">
          Cancelar
        </button>
        <button id="btn-confirmar-perfil" type="button"
          class="px-4 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded">
          Crear
        </button>
      </div>
    </div>
  </div>

  <!-- Modal: Mensaje -->
  <div id="modal-mensaje" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl p-6 w-80">
      <h3 id="modal-mensaje-titulo" class="text-base font-semibold text-gray-900 dark:text-gray-100 mb-2"></h3>
      <p id="modal-mensaje-texto" class="text-sm text-gray-700 dark:text-gray-300 mb-4"></p>
      <div class="flex justify-end">
        <button id="btn-cerrar-mensaje" type="button"
          class="px-4 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded">
          Aceptar
        </button>
      </div>
    </div>
  </div>

  <!-- Modal: Confirmar eliminación -->
  <div id="modal-confirmar" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl p-6 w-80">
      <h3 class="text-base font-semibold text-gray-900 dark:text-gray-100 mb-2">Confirmar</h3>
      <p id="modal-confirmar-texto" class="text-sm text-gray-700 dark:text-gray-300 mb-4"></p>
      <div class="flex justify-end gap-2">
        <button id="btn-cancelar-confirmar" type="button"
          class="px-4 py-2 text-sm bg-gray-200 hover:bg-gray-300 dark:bg-gray-600 dark:hover:bg-gray-500 text-gray-800 dark:text-gray-100 rounded">
          Cancelar
        </button>
        <button id="btn-aceptar-confirmar" type="button"
          class="px-4 py-2 text-sm bg-red-600 hover:bg-red-700 text-white rounded">
          Eliminar
        </button>
      </div>
    </div>
  </div>

  <!-- Modal: Previsualización de firma -->
  <div id="modal-preview" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl p-5 w-[420px] max-w-[95vw]">
      <h3 class="text-base font-semibold text-gray-900 dark:text-gray-100 mb-3">Previsualización de firma</h3>
      <div class="flex justify-center items-center gap-2 mb-3">
        <label class="text-xs text-gray-600 dark:text-gray-400">Papel:</label>
        <select id="previewPaperSize"
          class="text-xs px-2 py-1 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="a4" selected>A4 (210 × 297 mm)</option>
          <option value="oficio">Oficio (216 × 356 mm)</option>
          <option value="carta">Carta (216 × 279 mm)</option>
        </select>
      </div>
      <div class="flex justify-center mb-3">
        <div id="previewPage" class="relative bg-white border-2 border-gray-300 dark:border-gray-500 shadow-md"
             style="width:297px; height:420px;">
          <!-- Líneas de margen (guías) -->
          <div id="previewMarginTop" class="absolute left-0 right-0 border-b border-dashed border-blue-300 dark:border-blue-600 opacity-50"></div>
          <div id="previewMarginBottom" class="absolute left-0 right-0 border-t border-dashed border-blue-300 dark:border-blue-600 opacity-50"></div>
          <div id="previewMarginLeft" class="absolute top-0 bottom-0 border-r border-dashed border-blue-300 dark:border-blue-600 opacity-50"></div>
          <div id="previewMarginRight" class="absolute top-0 bottom-0 border-l border-dashed border-blue-300 dark:border-blue-600 opacity-50"></div>
          <!-- Rectángulo de firma -->
          <div id="previewSigBox" class="absolute border-2 border-green-500 bg-green-100 bg-opacity-40 dark:bg-green-900 dark:bg-opacity-40 rounded flex items-center justify-center overflow-hidden">
            <img id="previewSigImg" class="hidden max-w-full max-h-full object-contain" alt="Firma">
            <span id="previewSigText" class="text-green-700 dark:text-green-300 text-[9px] font-semibold text-center px-1">FIRMA</span>
          </div>
          <!-- Etiqueta de página -->
          <div id="previewPageLabel" class="absolute top-1 left-1/2 -translate-x-1/2 text-[9px] text-gray-400 dark:text-gray-500">A4</div>
        </div>
      </div>
      <div id="previewInfo" class="text-xs text-gray-500 dark:text-gray-400 text-center mb-3"></div>
      <div class="flex justify-end">
        <button id="btn-cerrar-preview" type="button"
          class="px-4 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded">
          Cerrar
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
